<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="100" height="100" fill="white"/>
  <!-- Square border -->
  <rect x="1.5" y="1.5" width="97" height="97" fill="none" stroke="#d1d5db" stroke-width="3"/>

  <!-- Main L: vertical bar -->
  <rect x="14" y="10" width="30" height="68" rx="9" ry="9" fill="#22c55e"/>
  <!-- Main L: horizontal foot -->
  <rect x="14" y="62" width="72" height="28" rx="9" ry="9" fill="#22c55e"/>

  <!-- Inner accent stroke (the right shadow L that gives depth) -->
  <rect x="38" y="18" width="16" height="52" rx="7" ry="7" fill="#16a34a"/>
  <!-- Blend accent into foot -->
  <rect x="38" y="62" width="16" height="16" fill="#16a34a"/>
</svg>
